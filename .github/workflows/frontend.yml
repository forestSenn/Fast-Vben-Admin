name: Frontend

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
          node-version: '22.18.0'

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend
        run: pnpm -F @vben/web-antd run typecheck

      - name: Build
        working-directory: frontend
        run: pnpm -F @vben/web-antd run build

  openapi-drift:
    runs-on: ubuntu-latest

    env:
      ACCESS_TOKEN_EXPIRE_MINUTES: 11520
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost"]'
      DOMAIN: localhost
      EMAILS_FROM_EMAIL: info@example.com
      ENVIRONMENT: local
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      FRONTEND_HOST: http://localhost:5173
      POSTGRES_DB: app
      POSTGRES_PASSWORD: test-postgres-password
      POSTGRES_PORT: 5432
      POSTGRES_SERVER: localhost
      POSTGRES_USER: postgres
      PROJECT_NAME: Fast Vben Admin
      SECRET_KEY: test-secret-key-for-ci
      SMTP_HOST: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - uses: astral-sh/setup-uv@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
          node-version: '22.18.0'

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Regenerate OpenAPI client
        run: pnpm generate:api

      - name: Check generated client drift
        run: git diff --exit-code -- frontend/apps/web-antd/src/api/generated

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: app
          POSTGRES_PASSWORD: test-postgres-password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ACCESS_TOKEN_EXPIRE_MINUTES: 11520
      BACKEND_CORS_ORIGINS: '["http://127.0.0.1:5173","http://localhost:5173","http://localhost"]'
      DOMAIN: localhost
      EMAILS_FROM_EMAIL: info@example.com
      ENVIRONMENT: local
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      FRONTEND_HOST: http://127.0.0.1:5173
      POSTGRES_DB: app
      POSTGRES_PASSWORD: test-postgres-password
      POSTGRES_PORT: 5432
      POSTGRES_SERVER: localhost
      POSTGRES_USER: postgres
      PROJECT_NAME: Fast Vben Admin
      SECRET_KEY: test-secret-key-for-ci
      SMTP_HOST: ''
      VITE_APP_TITLE: Fast Vben Admin
      VITE_GLOB_API_URL: /api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - uses: astral-sh/setup-uv@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
          node-version: '22.18.0'

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Seed initial data
        working-directory: backend
        run: uv run python -m app.initial_data

      - name: Start backend
        working-directory: backend
        run: |
          uv run fastapi run app/main.py --host 127.0.0.1 --port 8000 > ../backend-e2e.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/api/v1/utils/health-check; then
              exit 0
            fi
            sleep 2
          done
          cat backend-e2e.log
          exit 1

      - name: Run Playwright E2E
        env:
          E2E_API_URL: http://127.0.0.1:8000/api/v1
          E2E_BASE_URL: http://127.0.0.1:5173
        run: pnpm frontend:e2e

      - name: Show backend log on failure
        if: failure()
        run: cat backend-e2e.log

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/apps/web-antd/node_modules/.e2e
