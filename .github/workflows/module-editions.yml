name: Module Editions

on:
  pull_request:
  push:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        edition: [base, suite]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: app
          POSTGRES_PASSWORD: test-postgres-password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ACCESS_TOKEN_EXPIRE_MINUTES: 11520
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost"]'
      DOMAIN: localhost
      EMAILS_FROM_EMAIL: info@example.com
      ENVIRONMENT: local
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: test-superuser-password
      FRONTEND_HOST: http://localhost:5173
      POSTGRES_DB: app
      POSTGRES_PASSWORD: test-postgres-password
      POSTGRES_PORT: 5432
      POSTGRES_SERVER: localhost
      POSTGRES_USER: postgres
      PROJECT_NAME: Fast Vben Admin
      SECRET_KEY: test-secret-key-for-ci
      SMTP_HOST: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Migrate edition
        working-directory: backend
        env:
          APP_EDITION: ${{ matrix.edition }}
        run: uv run python -m app.modules.migrate --edition ${{ matrix.edition }}

      - name: Verify edition database ownership and startup state
        working-directory: backend
        env:
          APP_EDITION: ${{ matrix.edition }}
        run: |
          uv run python -c "from fastapi.testclient import TestClient; from app.main import app; client = TestClient(app); client.__enter__(); client.__exit__(None, None, None)"
          if [ "${{ matrix.edition }}" = "base" ]; then
            uv run python -c "from app.core.db import engine; from sqlalchemy import text; c = engine.connect(); assert c.execute(text(\"select to_regclass('items.item')\")).scalar_one() is None; c.close()"
          else
            uv run python -c "from app.core.db import engine; from sqlalchemy import text; c = engine.connect(); assert c.execute(text(\"select to_regclass('items.item')\")).scalar_one() == 'items.item'; assert c.execute(text(\"select version_num from public.alembic_version_items\")).scalar_one() == 'items_rename_tenant_index'; c.close()"
            uv run python -c "from alembic import command; from app.modules.migrations import module_alembic_config; command.check(module_alembic_config('items'))"
          fi
